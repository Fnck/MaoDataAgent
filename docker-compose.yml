services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-dataagent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dataagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8010:8010"
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dataagent}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-dataagent}
      - LOG_DIR=/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data

  frontend:
    build: ./frontend
    ports:
      - "9280:9280"
    depends_on:
      - backend

volumes:
  postgres_data:
